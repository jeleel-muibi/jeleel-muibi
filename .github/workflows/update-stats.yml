name: Update profile stats

on:
  schedule:
    - cron: "0 3 * * *"  # daily at 03:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&hide=issues,prs&hide_rank=true&hide_border=true&bg_color=00000000&title_color=24292e&text_color=57606a&icon_color=0969da"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&langs_count=5&hide_border=true&bg_color=00000000&title_color=24292e&text_color=57606a"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          git diff --staged --quiet || git commit -m "chore: update profile stats cards"
          git push
